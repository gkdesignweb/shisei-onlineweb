<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#0d9488"/>
  <title>資生國際|商品專區</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="資生國際"/>
  <link rel="manifest" href="/manifest.json"/>
  <style>
    .label-NEW     { background:#d1fae5; color:#047857; }
    .label-HOT     { background:#ffe4e6; color:#be123c; }
    .label-SALE    { background:#fef3c7; color:#b45309; }
    .label-BUNDLE  { background:#ede9fe; color:#6d28d9; }
    .label-GROUP   { background:#ddd6fe; color:#5b21b6; }   /* 團購 */
    .label-MONTHLY { background:#fee2e2; color:#b91c1c; }   /* 本月特價 */
    /* Logo image is hidden until /api/content provides a real URL */
    /* Hide scrollbars on horizontal carousels */
    .hide-sb::-webkit-scrollbar { display: none; }
    .hide-sb { scrollbar-width: none; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20 lg:pb-0">
  <header class="bg-white border-b border-slate-200 sticky top-0 z-30">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3 sm:py-4 flex items-center justify-between gap-3">
      <a href="/" class="flex items-center gap-2">
        <img data-content="site.logo.url" data-content-attr="src" alt="" class="h-8 w-auto hidden"/>
      </a>
      <div class="flex items-center gap-2 sm:gap-4">
        <nav class="hidden md:flex items-center gap-4 lg:gap-6 text-sm font-medium text-slate-700">
          <a href="/"               class="hover:text-teal-600">回首頁</a>
          <a href="/shop.html"      class="hover:text-teal-600">所有產品</a>
          <a href="/promotion.html" class="hover:text-teal-600">檔期優惠專區</a>
          <a href="/brands"         class="hover:text-teal-600">品牌館</a>
          <a href="/account.html"   class="hover:text-teal-600">會員中心</a>
        </nav>
        <button data-mini-cart data-auth-user style="display:none" class="relative bg-teal-600 text-white text-xs sm:text-sm font-semibold px-3 sm:px-4 py-2 rounded-full hover:bg-teal-700 inline-flex items-center gap-1">
          🛒 <span id="cartCount" class="font-bold">0</span>
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 py-6 sm:py-8">
    <!-- Search bar -->
    <form onsubmit="event.preventDefault(); applySearch()" class="relative mb-5">
      <input id="shopSearch" inputmode="search" placeholder="搜尋商品…" class="w-full pl-11 pr-14 sm:pr-24 py-3 border border-slate-200 rounded-full bg-white shadow-sm focus:outline-none focus:border-teal-500"/>
      <svg class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
      <button aria-label="搜尋" class="absolute right-1.5 top-1/2 -translate-y-1/2 bg-teal-600 text-white text-sm font-semibold p-2 sm:px-4 sm:py-1.5 rounded-full hover:bg-teal-700 active:bg-teal-800">
        <svg class="sm:hidden" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
        <span class="hidden sm:inline">搜尋</span>
      </button>
    </form>

    <div id="banner" class="hidden mb-5 p-4 bg-amber-50 border border-amber-200 rounded-xl text-sm text-amber-800"></div>

    <!-- Bundle promo row -->
    <section id="bundleSection" class="mb-8 hidden">
      <div class="flex items-end justify-between mb-3">
        <h2 class="text-lg sm:text-xl font-black flex items-center gap-2">
          <span class="bg-gradient-to-r from-violet-600 to-pink-500 bg-clip-text text-transparent">團購優惠</span>
        </h2>
        <span class="text-xs text-slate-500 hidden sm:inline">大量採購享更低單價</span>
      </div>
      <div id="bundleRow" class="flex gap-3 overflow-x-auto pb-2 hide-sb snap-x snap-mandatory"></div>
    </section>

    <!-- Category chips (kept on top) + mobile filter button -->
    <div class="flex items-center gap-3 mb-4 flex-wrap">
      <div id="catChips" class="flex items-center gap-2 overflow-x-auto pb-1 hide-sb flex-1 min-w-0"></div>
      <button id="openFilters" class="lg:hidden text-sm font-semibold bg-white border border-slate-200 rounded-full px-4 py-2 inline-flex items-center gap-1">
        ☰ 篩選 / 排序 <span id="filterChipCount" class="hidden text-xs bg-teal-600 text-white rounded-full px-1.5">0</span>
      </button>
    </div>

    <p id="tierLine" class="text-sm text-slate-500 mb-4"></p>

    <!-- Sidebar + grid -->
    <div class="lg:grid lg:grid-cols-[256px,1fr] lg:gap-6 lg:items-start">
      <!-- Filter sidebar (slide-over on mobile, fixed on desktop) -->
      <aside id="filterSidebar" class="hidden lg:block">
        <div class="bg-white rounded-2xl shadow-sm p-5 space-y-6 lg:sticky lg:top-20">
          <!-- Sort -->
          <div>
            <h3 class="text-xs font-bold uppercase tracking-wider text-slate-500 mb-3">排序</h3>
            <div class="space-y-2 text-sm">
              <label class="flex items-center gap-2"><input type="radio" name="fSort" value="newest"     checked> 最新</label>
              <label class="flex items-center gap-2"><input type="radio" name="fSort" value="price_asc"> 價格低到高</label>
              <label class="flex items-center gap-2"><input type="radio" name="fSort" value="price_desc"> 價格高到低</label>
              <label class="flex items-center gap-2"><input type="radio" name="fSort" value="stock"> 庫存多到少</label>
            </div>
          </div>

          <!-- Featured -->
          <div>
            <h3 class="text-xs font-bold uppercase tracking-wider text-slate-500 mb-3">特別篩選</h3>
            <label class="flex items-center gap-2 text-sm">
              <input type="checkbox" id="fFeatured"> <span>✨ 僅顯示精選商品</span>
            </label>
          </div>

          <!-- Brand -->
          <div>
            <h3 class="text-xs font-bold uppercase tracking-wider text-slate-500 mb-3">品牌</h3>
            <div id="fBrands" class="space-y-2 text-sm"></div>
          </div>

          <button onclick="clearFilters()" class="w-full text-xs text-slate-500 hover:text-rose-600 underline">清除所有篩選</button>
        </div>
      </aside>

      <!-- Mobile slide-over backdrop -->
      <div id="filterBackdrop" class="hidden lg:hidden fixed inset-0 bg-black/50 z-40" onclick="closeFilters()"></div>

      <!-- Product grid -->
      <div>
        <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6">
          <div class="bg-white rounded-2xl overflow-hidden border border-slate-200"><div class="aspect-square bg-slate-100 animate-pulse"></div><div class="p-4 space-y-2"><div class="h-3 bg-slate-100 rounded animate-pulse w-1/3"></div><div class="h-5 bg-slate-100 rounded animate-pulse"></div><div class="h-6 bg-slate-100 rounded animate-pulse w-2/3"></div></div></div>
          <div class="bg-white rounded-2xl overflow-hidden border border-slate-200 hidden sm:block"><div class="aspect-square bg-slate-100 animate-pulse"></div><div class="p-4 space-y-2"><div class="h-3 bg-slate-100 rounded animate-pulse w-1/3"></div><div class="h-5 bg-slate-100 rounded animate-pulse"></div><div class="h-6 bg-slate-100 rounded animate-pulse w-2/3"></div></div></div>
          <div class="bg-white rounded-2xl overflow-hidden border border-slate-200 hidden lg:block"><div class="aspect-square bg-slate-100 animate-pulse"></div><div class="p-4 space-y-2"><div class="h-3 bg-slate-100 rounded animate-pulse w-1/3"></div><div class="h-5 bg-slate-100 rounded animate-pulse"></div><div class="h-6 bg-slate-100 rounded animate-pulse w-2/3"></div></div></div>
        </div>
      </div>
    </div>
  </main>

  <!-- Spec/variant picker modal (mounted empty; populated by openSpecModal) -->
  <div id="specModal" class="hidden fixed inset-0 z-50 grid place-items-center p-4" style="background:rgba(15,23,42,.55);backdrop-filter:blur(4px);" onclick="if(event.target===this) closeSpecModal()"></div>

  <!-- Mobile bottom cart bar -->
  <a href="/checkout.html" id="bottomCart" class="lg:hidden fixed bottom-0 inset-x-0 bg-teal-600 text-white px-5 py-4 pb-[max(1rem,env(safe-area-inset-bottom))] hidden items-center justify-between font-semibold z-40 shadow-2xl">
    <span>🛒 <span id="bottomCartCount">0</span> 件商品</span>
    <span>前往結帳 →</span>
  </a>

  <script>
    let CART = {};
    let PRODUCT_BY_ID = {};   // id -> product (populated each render — lets addToCart check for variants)
    let CURRENT_CAT = '';
    let CURRENT_BRANDS = [];      // multi-select brand slugs
    let CURRENT_Q = '';
    let CURRENT_FEATURED = false;
    let CURRENT_SORT = 'newest';
    let ALL_BRANDS = [];

    window.applySearch = () => {
      const q = document.getElementById('shopSearch').value.trim();
      const params = new URLSearchParams(location.search);
      if (q) params.set('q', q); else params.delete('q');
      location.search = params.toString();
    };

    const LABEL_ZH = { NEW: '新品', HOT: '熱銷', SALE: '特價', BUNDLE: '組合' };

    async function refreshCart() {
      try {
        const r = await fetch('/api/cart');
        if (!r.ok) return;
        const { items } = await r.json();
        CART = Object.fromEntries(items.map(i => [i.productId, i.quantity]));
        const n = items.reduce((s,i)=>s+i.quantity,0);
        document.getElementById('cartCount').textContent = n;
        document.getElementById('bottomCartCount').textContent = n;
        document.getElementById('bottomCart').classList.toggle('hidden', n === 0);
        document.getElementById('bottomCart').classList.toggle('flex',   n > 0);
      } catch {}
    }

    async function loadCategories() {
      const { categories } = await fetch('/api/products/categories').then(r=>r.json());
      const chips = document.getElementById('catChips');
      chips.innerHTML = `<button data-slug="" class="chip ${CURRENT_CAT===''?'on':''}">全部</button>` +
        categories.map(c => `<button data-slug="${c.slug}" class="chip ${CURRENT_CAT===c.slug?'on':''}">${c.nameZh}</button>`).join('');
      chips.querySelectorAll('.chip').forEach(b => {
        b.addEventListener('click', () => { CURRENT_CAT = b.dataset.slug; loadProducts(); refreshChipState(); });
      });
      refreshChipState();
    }
    function refreshChipState() {
      document.querySelectorAll('.chip').forEach(b => {
        const on = b.dataset.slug === CURRENT_CAT;
        b.className = 'chip whitespace-nowrap text-xs sm:text-sm font-medium px-3 py-1.5 rounded-full border ' +
          (on ? 'bg-slate-900 text-white border-slate-900' : 'bg-white text-slate-700 border-slate-200');
      });
    }

    async function loadBundle() {
      const section = document.getElementById('bundleSection');
      const row = document.getElementById('bundleRow');
      // Try to fetch real Bundle entities — requires verified member auth.
      const r = await fetch('/api/bundles?featured=1');
      if (r.status === 401 || r.status === 403) {
        section.classList.remove('hidden');
        row.innerHTML = `
          <div class="snap-start shrink-0 w-full sm:w-96 bg-gradient-to-br from-violet-50 to-pink-50 border-2 border-dashed border-violet-200 rounded-2xl p-6 text-center">
            <p class="text-2xl mb-2">🔒</p>
            <p class="text-sm font-semibold text-violet-800">登入會員查看獨家團購優惠</p>
            <a href="/login.html" class="mt-3 inline-block bg-violet-600 text-white text-xs font-semibold px-4 py-2 rounded-full hover:bg-violet-700">立即登入</a>
          </div>`;
        return;
      }
      if (!r.ok) { section.classList.add('hidden'); return; }
      const { bundles } = await r.json();
      if (!bundles?.length) { section.classList.add('hidden'); return; }
      section.classList.remove('hidden');
      row.innerHTML = bundles.map(bundleCard).join('');
    }

    function bundleCard(b) {
      const itemsText = b.items.map(i => `${i.product.nameZh}×${i.quantity}`).join(' + ');
      const saved = b.originalPrice - b.bundlePrice;
      return `
        <div class="snap-start shrink-0 w-72 sm:w-80 bg-gradient-to-br from-white via-violet-50 to-pink-50 border border-violet-100 rounded-2xl p-4 shadow-sm">
          <div class="flex items-center gap-3 mb-3">
            <div class="w-14 h-14 rounded-xl bg-white overflow-hidden shrink-0 grid place-items-center">
              ${b.imageUrl ? `<img loading="lazy" src="${b.imageUrl}" class="w-full h-full object-cover"/>` : '<span class="text-2xl">🎁</span>'}
            </div>
            <div class="min-w-0 flex-1">
              <p class="text-xs text-violet-600 font-semibold">團購組合</p>
              <p class="text-sm font-bold truncate">${b.nameZh}</p>
            </div>
          </div>
          <p class="text-xs text-slate-500 line-clamp-2 mb-2">${itemsText}</p>
          <div class="flex items-end justify-between mb-3">
            <div>
              <p class="text-[11px] text-slate-400 line-through">原價 NT$ ${b.originalPrice.toLocaleString()}</p>
              <p class="text-lg font-black text-violet-700">NT$ ${b.bundlePrice.toLocaleString()}</p>
              ${saved > 0 ? `<p class="text-[11px] text-rose-600 font-bold">省 NT$ ${saved.toLocaleString()}</p>` : ''}
            </div>
            <button onclick="addBundleToCart('${b.id}')" class="bg-violet-600 text-white text-xs font-bold px-3 py-2 rounded-lg hover:bg-violet-700">加入</button>
          </div>
        </div>`;
    }

    window.addBundleToCart = async (bundleId) => {
      const r = await fetch('/api/cart', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ bundleId, quantity: 1 }),
      });
      if (r.ok) await refreshCart();
      else alert('加入失敗');
    };

    async function loadProducts() {
      const meRes = await fetch('/api/auth/me').then(r=>r.json());
      const user = meRes.user;
      const banner = document.getElementById('banner');
      const tierLine = document.getElementById('tierLine');

      banner.classList.add('hidden');
      if (!user) {
        banner.classList.remove('hidden');
        banner.innerHTML = `您尚未登入，價格資訊將維持隱藏。<a href="/login.html" class="font-semibold underline">立即登入</a>`;
      } else if (user.verificationStatus !== 'APPROVED') {
        banner.classList.remove('hidden');
        banner.innerHTML = `您的會員身份審核中，通過後即可看到專屬價格。`;
      } else {
        tierLine.innerHTML = `會員等級：<span class="tier-pill ${user.tier==='GOLD'?'tier-gold':'tier-bronze'}">${user.tier}</span>`;
        await refreshCart();
      }

      const params = new URLSearchParams();
      if (CURRENT_CAT)         params.set('category', CURRENT_CAT);
      if (CURRENT_BRANDS.length) params.set('brand', CURRENT_BRANDS.join(','));
      if (CURRENT_Q)           params.set('q', CURRENT_Q);
      if (CURRENT_FEATURED)    params.set('featured', '1');
      if (CURRENT_SORT)        params.set('sort', CURRENT_SORT);

      const { verified, products } = await fetch('/api/products?' + params).then(r=>r.json());
      PRODUCT_BY_ID = Object.fromEntries((products ?? []).map(p => [p.id, p]));
      const grid = document.getElementById('grid');
      if (!products.length) {
        grid.innerHTML = `<div class="col-span-full empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 21l-.9-1.8a4 4 0 00-3.6-2.2H4.5a1.5 1.5 0 01-1.5-1.5V5.5A1.5 1.5 0 014.5 4H9l3 3h7.5A1.5 1.5 0 0121 8.5v7a1.5 1.5 0 01-1.5 1.5H17a4 4 0 00-3.6 2.2L12.5 21"/></svg>
          <p>此分類沒有商品。</p>
        </div>`;
        return;
      }
      grid.classList.add('fade-up-stagger');
      grid.innerHTML = products.map(p => card(p, verified)).join('');
    }

    function card(p, verified) {
      // Label tags now live in the body (above the title), not as image overlays.
      const tags = [
        ...p.labels.map(l => `<span class="pbadge pbadge-${l}">${LABEL_ZH[l] ?? l}</span>`),
        ...(p.isGroupBuy       ? ['<span class="pbadge pbadge-GROUP">團購</span>']    : []),
        ...(p.isMonthlySpecial ? ['<span class="pbadge pbadge-MONTHLY">本月特價</span>'] : []),
      ].join('');

      const showOriginal = p.priceOriginal && p.priceDiscount && p.priceOriginal > p.priceDiscount;
      const savePct = showOriginal ? Math.round((1 - p.priceDiscount / p.priceOriginal) * 100) : 0;

      // Gallery dot indicators (up to 3 — purely decorative until the gallery is wired)
      const dots = (p.images?.length > 1)
        ? `<div class="pcard__dots">${p.images.slice(0,3).map((_,i)=>`<span class="${i===0?'is-on':''}"></span>`).join('')}</div>`
        : '';

      const priceBlock = verified ? `
        <div class="pcard__price-row">
          <span class="pcard__price">NT$ ${p.priceDiscount.toLocaleString()}</span>
          ${showOriginal ? `<span class="pcard__strike">NT$ ${p.priceOriginal.toLocaleString()}</span>` : ''}
          ${savePct ? `<span class="pcard__save">-${savePct}%</span>` : ''}
        </div>
        ${p.priceBulk ? `<p class="pcard__bulk">≥ ${p.bulkMinQty}件  NT$ ${p.priceBulk.toLocaleString()}</p>` : ''}
      ` : `<div class="text-sm price-locked mt-1">登入後顯示價格</div>`;

      const skuLink = `/products/${encodeURIComponent(p.id)}`;
      return `
        <article class="pcard">
          <a href="${skuLink}" class="pcard__media block">
            ${p.imageUrl
              ? `<img loading="lazy" src="${p.imageUrl}" alt="${p.nameZh}"/>`
              : `<div class="grid place-items-center h-full text-5xl">${categoryEmoji(p.category.slug)}</div>`}
          </a>
          ${verified ? `
            <button class="pcard__wish" onclick="event.preventDefault(); toggleWish('${p.id}', this)" aria-label="加入收藏">
              <svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5">
                <path d="M12 20.6l-1.13-1.03C6.4 15.5 3 12.4 3 8.7 3 6.1 5.1 4 7.7 4c1.55 0 3.04.74 4.3 1.94C13.26 4.74 14.75 4 16.3 4 18.9 4 21 6.1 21 8.7c0 3.7-3.4 6.8-7.87 10.88L12 20.6z"/>
              </svg>
            </button>` : ''}
          ${dots}
          <div class="pcard__body">
            ${tags ? `<div class="pcard__tags">${tags}</div>` : ''}
            <a href="${skuLink}"><h3 class="pcard__name">${p.nameZh}</h3></a>
            ${priceBlock}
            ${verified
              ? `<div class="pcard__qty-row">
                   <input type="number" min="1" value="${CART[p.id] ?? 1}" id="q-${p.id}" aria-label="數量"/>
                   <button class="pcard__cta" onclick="addToCart('${p.id}')">加入購物車</button>
                 </div>`
              : `<a href="/login.html" class="pcard__cta pcard__cta--locked">登入後購買</a>`}
          </div>
        </article>`;
    }

    function categoryEmoji(slug) {
      return ({consumables:'🧤', orthodontic:'🦷', implant:'⚙️', instruments:'🔧'})[slug] ?? '📦';
    }

    window.addToCart = async (productId, variantId = null) => {
      const qty = parseInt(document.getElementById('q-' + productId)?.value ?? '1', 10);
      const product = PRODUCT_BY_ID[productId];
      // If the product has spec/size/color options and no variant was picked yet,
      // open the spec picker modal instead of adding straight to cart.
      if (!variantId && product?.variants?.length) {
        openSpecModal(product, qty);
        return;
      }
      const r = await fetch('/api/cart', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ productId, variantId, quantity: qty }),
      });
      if (r.ok) { await refreshCart(); closeSpecModal(); }
      else alert('加入失敗，請確認已登入並通過審核');
    };

    // ---- Spec picker modal ----
    const SPEC_TYPE_ZH = { size: '尺寸', color: '顏色', spec: '規格', option: '選項' };
    function openSpecModal(p, qty) {
      const optionType = p.variants[0]?.optionType ?? 'option';
      const variantsHtml = p.variants.map(v => {
        const oos = v.stock <= 0;
        const priceLine = v.priceDiscount != null
          ? `<span class="text-sm font-bold text-teal-700">NT$ ${v.priceDiscount.toLocaleString()}</span>`
          : '';
        return `
          <button type="button" data-vid="${v.id}" ${oos ? 'disabled' : ''}
            class="spec-opt w-full flex items-center justify-between gap-3 border-2 rounded-xl px-4 py-3 text-left transition
                   ${oos ? 'border-slate-100 bg-slate-50 opacity-60 cursor-not-allowed' : 'border-slate-200 hover:border-teal-500 hover:bg-teal-50'}">
            <div class="flex items-center gap-3 min-w-0">
              ${v.imageUrl ? `<img src="${v.imageUrl}" class="w-10 h-10 rounded-lg object-cover bg-slate-100 shrink-0"/>` : ''}
              <div class="min-w-0">
                <p class="font-semibold text-slate-900 truncate">${v.name}</p>
                <p class="text-xs text-slate-500">${oos ? '缺貨' : '庫存 ' + v.stock}${v.sku ? ' · ' + v.sku : ''}</p>
              </div>
            </div>
            <div class="text-right shrink-0">${priceLine}</div>
          </button>`;
      }).join('');

      const modal = document.getElementById('specModal');
      modal.innerHTML = `
        <div class="card w-full max-w-md p-6">
          <div class="flex items-start justify-between mb-1 gap-3">
            <div class="min-w-0">
              <h2 class="text-lg font-black truncate">${p.nameZh}</h2>
              <p class="text-xs text-slate-500 mt-0.5">請選擇${SPEC_TYPE_ZH[optionType] ?? '規格'}後加入購物車</p>
            </div>
            <button type="button" onclick="closeSpecModal()" aria-label="關閉" class="text-slate-400 hover:text-slate-700 text-2xl leading-none">×</button>
          </div>
          <div class="space-y-2 mt-4 max-h-[55vh] overflow-y-auto pr-1">${variantsHtml}</div>
          <div class="flex items-center gap-3 mt-5">
            <label class="text-xs text-slate-500">數量</label>
            <input id="specQty" type="number" min="1" value="${qty || 1}" class="w-20 px-3 py-2 border border-slate-200 rounded-lg text-center font-bold focus:outline-none focus:border-teal-500"/>
            <div class="flex-1"></div>
            <button type="button" onclick="closeSpecModal()" class="btn btn-ghost">取消</button>
          </div>
        </div>`;
      modal.classList.remove('hidden');

      // Each variant button auto-submits add-to-cart on click
      modal.querySelectorAll('.spec-opt[data-vid]').forEach((btn) => {
        btn.addEventListener('click', () => {
          const variantId = btn.dataset.vid;
          const newQty = parseInt(document.getElementById('specQty').value, 10) || 1;
          // Inject into the per-card qty input so addToCart reads it
          const cardQty = document.getElementById('q-' + p.id);
          if (cardQty) cardQty.value = newQty;
          addToCart(p.id, variantId);
        });
      });
    }
    window.closeSpecModal = () => document.getElementById('specModal').classList.add('hidden');

    // Toggle wishlist heart — optimistic UI, falls back if the API rejects.
    window.toggleWish = async (productId, btn) => {
      const wasOn = btn.classList.contains('is-on');
      btn.classList.toggle('is-on');
      const r = await fetch('/api/wishlist/' + productId, {
        method: wasOn ? 'DELETE' : 'POST',
      });
      if (!r.ok) {
        btn.classList.toggle('is-on'); // revert
        if (r.status === 401) location.href = '/login.html';
      }
    };

    // Sidebar change listeners (delegated so they fire after slide-over open too)
    document.addEventListener('change', (e) => {
      if (e.target.matches?.('input[name="fSort"]') ||
          e.target.id === 'fFeatured' ||
          e.target.matches?.('#fBrands input[type=checkbox]')) {
        applyFiltersFromSidebar();
      }
    });
    document.addEventListener('click', (e) => {
      if (e.target.closest('#openFilters')) openFilters();
    });

    async function loadBrands() {
      const { brands } = await fetch('/api/brands').then(r=>r.json());
      ALL_BRANDS = brands ?? [];
      renderBrandFilters();
    }
    function renderBrandFilters() {
      const html = ALL_BRANDS.map(b => `
        <label class="flex items-center justify-between gap-2 text-sm cursor-pointer hover:text-teal-700">
          <span class="flex items-center gap-2">
            <input type="checkbox" data-brand-slug="${b.slug}" ${CURRENT_BRANDS.includes(b.slug) ? 'checked' : ''}/>
            ${b.logoUrl ? `<img loading="lazy" src="${b.logoUrl}" class="w-5 h-5 object-contain"/>` : ''}
            <span>${b.nameZh}</span>
          </span>
          <span class="text-xs text-slate-400">${b.productCount}</span>
        </label>
      `).join('');
      document.querySelectorAll('#fBrands').forEach(el => el.innerHTML = html || '<p class="text-xs text-slate-400">無品牌資料</p>');
    }

    function applyFiltersFromSidebar() {
      CURRENT_SORT = document.querySelector('input[name="fSort"]:checked')?.value ?? 'newest';
      CURRENT_FEATURED = document.getElementById('fFeatured').checked;
      CURRENT_BRANDS = [...document.querySelectorAll('#fBrands input:checked')].map(i => i.dataset.brandSlug);
      updateChipCount();
      loadProducts();
    }
    function updateChipCount() {
      const n = CURRENT_BRANDS.length + (CURRENT_FEATURED ? 1 : 0);
      const el = document.getElementById('filterChipCount');
      if (n > 0) { el.textContent = n; el.classList.remove('hidden'); }
      else el.classList.add('hidden');
    }
    window.clearFilters = () => {
      CURRENT_BRANDS = []; CURRENT_FEATURED = false; CURRENT_SORT = 'newest';
      document.getElementById('fFeatured').checked = false;
      document.querySelector('input[name="fSort"][value="newest"]').checked = true;
      document.querySelectorAll('#fBrands input').forEach(i => i.checked = false);
      updateChipCount(); loadProducts();
    };

    // Mobile slide-over
    window.openFilters  = () => {
      document.getElementById('filterSidebar').classList.remove('hidden');
      document.getElementById('filterSidebar').classList.add('fixed','inset-y-0','left-0','z-50','w-72','bg-white','shadow-2xl','overflow-y-auto','p-2');
      document.getElementById('filterBackdrop').classList.remove('hidden');
    };
    window.closeFilters = () => {
      document.getElementById('filterSidebar').classList.add('hidden');
      document.getElementById('filterSidebar').classList.remove('fixed','inset-y-0','left-0','z-50','w-72','bg-white','shadow-2xl','overflow-y-auto','p-2');
      document.getElementById('filterBackdrop').classList.add('hidden');
    };

    (async () => {
      const url = new URL(location.href);
      CURRENT_CAT      = url.searchParams.get('category') ?? '';
      CURRENT_BRANDS   = (url.searchParams.get('brand') ?? '').split(',').filter(Boolean);
      CURRENT_Q        = url.searchParams.get('q') ?? '';
      CURRENT_FEATURED = url.searchParams.get('featured') === '1';
      CURRENT_SORT     = url.searchParams.get('sort') ?? 'newest';

      document.getElementById('shopSearch').value = CURRENT_Q;
      document.getElementById('fFeatured').checked = CURRENT_FEATURED;
      const sortRadio = document.querySelector(`input[name="fSort"][value="${CURRENT_SORT}"]`);
      if (sortRadio) sortRadio.checked = true;

      if (CURRENT_Q) {
        const banner = document.createElement('div');
        banner.className = 'mb-4 p-3 bg-teal-50 border border-teal-200 rounded-xl text-sm flex items-center justify-between';
        banner.innerHTML = `<span>搜尋：<b>${CURRENT_Q}</b></span><a href="/shop.html" class="text-xs text-teal-700 underline">清除</a>`;
        document.querySelector('main').insertBefore(banner, document.querySelector('main').firstChild.nextSibling);
      }

      await Promise.all([loadCategories(), loadBrands()]);
      updateChipCount();
      await Promise.all([loadBundle(), loadProducts()]);
    })();
  </script>
  <div id="siteFooter"></div>
  <script src="/js/cart-mini.js"></script>
  <script src="/js/mobile-menu.js"></script>
  <script src="/js/auth-nav.js"></script>
  <script src="/js/content.js"></script>
  <script src="/js/footer.js"></script>
  <script src="/js/pwa.js"></script>
  <script>
    // Pull admin-curated nav page links into shop header
    (async () => {
      const site = await fetch('/api/site').then(r=>r.json()).catch(()=>({}));
      const slot = document.getElementById('shopNavExtras');
      if (!slot || !site.shopNavPages?.length) return;
      slot.innerHTML = site.shopNavPages.map(p =>
        `<a href="${p.href ?? ('/p/' + p.slug)}" class="text-xs sm:text-sm font-medium text-slate-600 hover:text-teal-600">${p.title}</a>`
      ).join('');
    })();
  </script>
</body>
</html>
