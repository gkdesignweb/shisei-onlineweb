<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>運費與地區 · 管理後台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body class="admin bg-slate-100 min-h-screen">
  <header class="bg-slate-900 text-white sticky top-0 z-40 shadow-md">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between flex-wrap gap-3">
      <a href="/admin.html" class="flex items-center gap-3 mr-6 shrink-0">
        <img data-content="admin.logo.url" data-content-attr="src" alt="" class="h-8 w-auto hidden"/>
        
        <span class="font-bold tracking-wide">管理後台</span>
      </a>
      <nav id="adminNav" class="text-sm space-x-5"></nav>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-6 py-10">
    <div class="flex justify-between items-center mb-6 flex-wrap gap-3">
      <div>
        <h1 class="text-2xl font-black">運費與地區</h1>
        <p class="text-sm text-slate-500 mt-1">為不同收件地區設定免運門檻與運費。結帳頁會顯示這份清單，顧客選擇地區後即套用對應規則。</p>
      </div>
      <button onclick="openNew()" class="bg-teal-600 text-white text-sm font-semibold px-4 py-2 rounded-lg hover:bg-teal-700">+ 新增地區</button>
    </div>

    <div id="rows" class="bg-white rounded-2xl shadow-sm overflow-hidden">
      <p class="text-center text-slate-500 py-10">載入中…</p>
    </div>
  </main>

  <div id="modal" class="hidden fixed inset-0 bg-black/50 z-50 grid place-items-center p-4">
    <div class="bg-white rounded-2xl p-6 w-full max-w-lg">
      <h3 id="modalTitle" class="font-bold text-lg mb-4">新增配送地區</h3>
      <div class="space-y-3 text-sm">
        <div>
          <label class="text-xs text-slate-500">地區代碼 *（英數）</label>
          <input id="fCode" placeholder="例：MAIN / OUTER / REMOTE" class="mt-1 w-full px-3 py-2 border border-slate-200 rounded-lg font-mono text-sm"/>
        </div>
        <div>
          <label class="text-xs text-slate-500">地區名稱 *</label>
          <input id="fName" placeholder="例：台灣本島" class="mt-1 w-full px-3 py-2 border border-slate-200 rounded-lg"/>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-xs text-slate-500">免運門檻 (NT$) *</label>
            <input id="fFreeAt" type="number" min="0" placeholder="3000" class="mt-1 w-full px-3 py-2 border border-slate-200 rounded-lg"/>
          </div>
          <div>
            <label class="text-xs text-slate-500">未達門檻運費 (NT$) *</label>
            <input id="fFee" type="number" min="0" placeholder="120" class="mt-1 w-full px-3 py-2 border border-slate-200 rounded-lg"/>
          </div>
        </div>
        <div class="grid grid-cols-3 gap-3">
          <div>
            <label class="text-xs text-slate-500">排序</label>
            <input id="fSort" type="number" value="10" class="mt-1 w-full px-3 py-2 border border-slate-200 rounded-lg"/>
          </div>
          <label class="flex items-center gap-2 mt-5 text-sm"><input id="fActive" type="checkbox" checked/> 啟用</label>
          <label class="flex items-center gap-2 mt-5 text-sm"><input id="fDefault" type="checkbox"/> 設為預設</label>
        </div>
        <p class="text-[11px] text-slate-400 pt-2 border-t border-slate-100">提示：標記「設為預設」會自動取消其他地區的預設標記。結帳頁會以預設地區為初始選項。</p>
      </div>
      <div class="flex justify-end gap-2 mt-5">
        <button onclick="closeModal()" class="px-3 py-1.5 text-sm rounded border border-slate-200">取消</button>
        <button id="saveBtn" class="px-3 py-1.5 text-sm rounded bg-teal-600 text-white">儲存</button>
      </div>
    </div>
  </div>

  <script src="/js/admin-nav.js"></script>
  <script src="/js/content.js"></script>
  <script>
    let EDIT_ID = null;
    const F = (id) => document.getElementById(id);
    const BASE = '/api/shipping/admin/regions';

    async function load() {
      const { regions } = await fetch(BASE).then(r=>r.json());
      const c = F('rows');
      if (!regions || regions.length === 0) {
        c.innerHTML = '<p class="text-center text-slate-500 py-10">尚未設定任何地區。點擊「+ 新增地區」開始。</p>';
        return;
      }
      c.innerHTML = `<table class="w-full text-sm">
        <thead class="bg-slate-50 text-xs text-slate-500 uppercase tracking-wider">
          <tr>
            <th class="px-5 py-3 text-left">排序</th>
            <th class="px-5 py-3 text-left">代碼</th>
            <th class="px-5 py-3 text-left">名稱</th>
            <th class="px-5 py-3 text-right">免運門檻</th>
            <th class="px-5 py-3 text-right">運費</th>
            <th class="px-5 py-3 text-center">狀態</th>
            <th class="px-5 py-3"></th>
          </tr>
        </thead>
        <tbody>${regions.map(r => `
          <tr class="border-t border-slate-100">
            <td class="px-5 py-3">${r.sortOrder}</td>
            <td class="px-5 py-3 font-mono text-xs">${r.code}</td>
            <td class="px-5 py-3 font-semibold">${r.nameZh}${r.isDefault?' <span class="text-xs text-teal-600">[預設]</span>':''}</td>
            <td class="px-5 py-3 text-right">NT$ ${r.freeAtAmount.toLocaleString()}</td>
            <td class="px-5 py-3 text-right">NT$ ${r.shippingFee.toLocaleString()}</td>
            <td class="px-5 py-3 text-center"><span class="text-xs px-2 py-0.5 rounded ${r.isActive?'bg-emerald-100 text-emerald-700':'bg-slate-100 text-slate-500'}">${r.isActive?'啟用':'停用'}</span></td>
            <td class="px-5 py-3 text-right space-x-3">
              <button onclick='openEdit(${JSON.stringify(r)})' class="text-xs text-teal-600">編輯</button>
              <button onclick="del('${r.id}')" class="text-xs text-red-600">刪除</button>
            </td>
          </tr>`).join('')}</tbody>
      </table>`;
    }

    window.openNew = () => { EDIT_ID = null; fill({}); F('modalTitle').textContent='新增配送地區'; F('modal').classList.remove('hidden'); };
    window.openEdit = (r) => { EDIT_ID = r.id; fill(r); F('modalTitle').textContent='編輯配送地區'; F('modal').classList.remove('hidden'); };
    window.closeModal = () => F('modal').classList.add('hidden');
    function fill(r) {
      F('fCode').value = r.code ?? '';
      F('fName').value = r.nameZh ?? '';
      F('fFreeAt').value = r.freeAtAmount ?? 3000;
      F('fFee').value = r.shippingFee ?? 120;
      F('fSort').value = r.sortOrder ?? 10;
      F('fActive').checked = r.isActive ?? true;
      F('fDefault').checked = !!r.isDefault;
    }
    F('saveBtn').addEventListener('click', async () => {
      const body = {
        code:         F('fCode').value.trim().toUpperCase(),
        nameZh:       F('fName').value.trim(),
        freeAtAmount: parseInt(F('fFreeAt').value, 10) || 0,
        shippingFee:  parseInt(F('fFee').value, 10) || 0,
        sortOrder:    parseInt(F('fSort').value, 10) || 0,
        isActive:     F('fActive').checked,
        isDefault:    F('fDefault').checked,
      };
      if (!body.code || !body.nameZh) return alert('請填入代碼與名稱');
      const r = await fetch(EDIT_ID ? BASE + '/' + EDIT_ID : BASE, {
        method: EDIT_ID ? 'PUT' : 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(body),
      });
      if (!r.ok) {
        const d = await r.json().catch(()=>({}));
        return alert(d.error === 'code_exists' ? '地區代碼已存在' : '儲存失敗');
      }
      closeModal(); load();
    });
    window.del = async (id) => {
      if (!confirm('刪除此地區？已使用此地區的訂單仍會保留記錄。')) return;
      await fetch(BASE + '/' + id, { method:'DELETE' });
      load();
    };
    load();
  </script>
</body>
</html>
