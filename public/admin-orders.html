<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>訂單管理 · 管理後台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body class="admin bg-slate-100 min-h-screen">
  <header class="bg-slate-900 text-white sticky top-0 z-40 shadow-md">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between flex-wrap gap-3">
      <a href="/admin.html" class="flex items-center gap-3 mr-6 shrink-0">
        <img data-content="admin.logo.url" data-content-attr="src" alt="" class="h-8 w-auto hidden"/>
        
        <span class="font-bold tracking-wide">管理後台</span>
      </a>
      <nav id="adminNav" class="text-sm space-x-5"></nav>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-10">
    <div class="flex items-center justify-between mb-6 flex-wrap gap-3">
      <div>
        <h1 class="text-2xl font-black">訂單管理</h1>
        <p class="text-sm text-slate-500 mt-1">全部訂單、付款狀態、出貨、發票下載。</p>
      </div>
    </div>

    <div class="flex flex-wrap gap-3 mb-4">
      <input id="q" placeholder="搜尋訂單編號 / 收件人 / 電話" class="flex-1 min-w-[260px] px-3 py-2 border border-slate-200 rounded-lg bg-white"/>
      <select id="status" class="px-3 py-2 border border-slate-200 rounded-lg bg-white">
        <option value="">全部狀態</option>
        <option value="PENDING_PAYMENT">待付款</option>
        <option value="PAID">已付款</option>
        <option value="PROCESSING">處理中</option>
        <option value="SHIPPED">已出貨</option>
        <option value="DELIVERED">已送達</option>
        <option value="CANCELLED">已取消</option>
        <option value="REFUNDED">已退款</option>
      </select>
    </div>

    <div class="bg-white rounded-2xl shadow-sm overflow-x-auto">
      <table class="w-full text-sm">
        <thead class="bg-slate-50 text-xs text-slate-500 uppercase tracking-wider">
          <tr>
            <th class="px-4 py-3 text-left">訂單編號 / 時間</th>
            <th class="px-4 py-3 text-left">會員</th>
            <th class="px-4 py-3 text-right">金額</th>
            <th class="px-4 py-3 text-left">付款 / 發票</th>
            <th class="px-4 py-3 text-left">狀態</th>
            <th class="px-4 py-3"></th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </main>

  <!-- Detail modal -->
  <div id="detail" class="hidden fixed inset-0 bg-black/50 z-50 grid place-items-center p-4">
    <div class="bg-white rounded-2xl w-full max-w-4xl max-h-[92vh] flex flex-col">
      <div class="p-5 border-b border-slate-100 flex items-center justify-between">
        <h3 id="detailTitle" class="font-bold text-lg"></h3>
        <button onclick="closeDetail()" class="text-slate-500 hover:text-slate-900 text-xl">×</button>
      </div>
      <div id="detailBody" class="p-6 overflow-y-auto flex-1 text-sm"></div>
      <div class="p-4 border-t border-slate-100 flex justify-between gap-2 flex-wrap">
        <div id="detailActions" class="flex gap-2"></div>
        <div class="flex gap-2">
          <a id="invoiceLink" target="_blank" class="text-sm bg-teal-600 text-white font-semibold px-4 py-2 rounded-lg hover:bg-teal-700">📄 查看 / 下載發票</a>
          <button onclick="closeDetail()" class="text-sm px-4 py-2 rounded-lg border border-slate-200">關閉</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/admin-nav.js"></script>
  <script>
    const STATUS = {
      PENDING_PAYMENT: { zh: '待付款',  cls: 'bg-amber-100 text-amber-700' },
      PAID:            { zh: '已付款',  cls: 'bg-emerald-100 text-emerald-700' },
      PROCESSING:      { zh: '處理中',  cls: 'bg-blue-100 text-blue-700' },
      SHIPPED:         { zh: '已出貨',  cls: 'bg-teal-100 text-teal-700' },
      DELIVERED:       { zh: '已送達',  cls: 'bg-emerald-100 text-emerald-700' },
      CANCELLED:       { zh: '已取消',  cls: 'bg-slate-100 text-slate-500' },
      REFUNDED:        { zh: '已退款',  cls: 'bg-rose-100 text-rose-700' },
    };
    const PAY = {
      CREDIT: '信用卡', CREDIT_INSTALLMENT: '信用卡分期',
      ATM: 'ATM 轉帳', CVS: '超商代碼', MONTHLY: '月結對帳單',
    };

    let ORDERS = [];

    async function load() {
      const params = new URLSearchParams();
      if (document.getElementById('status').value) params.set('status', document.getElementById('status').value);
      const { orders } = await fetch('/api/admin/orders?' + params).then(r=>r.json());
      ORDERS = orders ?? [];
      render();
    }

    function render() {
      const q = document.getElementById('q').value.trim().toLowerCase();
      const list = ORDERS.filter(o => !q
        || o.merchantTradeNo.toLowerCase().includes(q)
        || (o.recipientName ?? '').toLowerCase().includes(q)
        || (o.recipientPhone ?? '').includes(q)
        || (o.user?.email ?? '').toLowerCase().includes(q)
        || (o.user?.clinicName ?? '').toLowerCase().includes(q)
      );
      const c = document.getElementById('rows');
      if (list.length === 0) { c.innerHTML = '<tr><td colspan="6" class="px-4 py-12 text-center text-slate-500">沒有訂單。</td></tr>'; return; }
      c.innerHTML = list.map(o => {
        const s = STATUS[o.status] ?? { zh: o.status, cls: 'bg-slate-100' };
        const who = o.user?.clinicName ?? o.user?.name ?? '—';
        return `
          <tr class="border-t border-slate-100 hover:bg-slate-50 cursor-pointer" onclick="openDetail('${o.id}')">
            <td class="px-4 py-3">
              <p class="font-mono text-xs">${o.merchantTradeNo}</p>
              <p class="text-xs text-slate-500">${new Date(o.createdAt).toLocaleString('zh-TW')}</p>
            </td>
            <td class="px-4 py-3">
              <p class="font-semibold text-xs">${who}</p>
              <p class="text-[11px] text-slate-500">${o.user?.email ?? ''}</p>
            </td>
            <td class="px-4 py-3 text-right font-semibold">NT$ ${o.total.toLocaleString()}</td>
            <td class="px-4 py-3 text-xs">
              <p>${PAY[o.paymentMethod] ?? o.paymentMethod}</p>
              <p class="text-slate-500">${o.invoiceNumber ? '發票 ' + o.invoiceNumber : '未開立'}</p>
            </td>
            <td class="px-4 py-3"><span class="text-xs px-2 py-0.5 rounded ${s.cls}">${s.zh}</span></td>
            <td class="px-4 py-3 text-right" onclick="event.stopPropagation()">
              <a href="/api/orders/${o.id}/invoice" target="_blank" class="text-xs text-teal-600">📄 發票</a>
            </td>
          </tr>`;
      }).join('');
    }

    window.openDetail = async (id) => {
      const r = await fetch('/api/orders/' + id);
      if (!r.ok) return alert('讀取失敗');
      const { order: o } = await r.json();
      const s = STATUS[o.status] ?? { zh: o.status, cls: 'bg-slate-100' };
      document.getElementById('detailTitle').textContent = '訂單 ' + o.merchantTradeNo;
      document.getElementById('invoiceLink').href = '/api/orders/' + o.id + '/invoice';

      const actions = document.getElementById('detailActions');
      actions.innerHTML = `
        <input id="shipTracking" value="${escapeAttr(o.trackingNumber ?? '')}"
               placeholder="物流追蹤號" class="text-sm px-3 py-2 border border-slate-200 rounded-lg"/>
        <button onclick="saveTracking('${o.id}')" class="text-sm bg-slate-900 text-white font-semibold px-4 py-2 rounded-lg hover:bg-slate-800">儲存追蹤號</button>
        ${o.status === 'PAID' ? `<button onclick="ship('${o.id}')" class="text-sm bg-teal-600 text-white font-semibold px-4 py-2 rounded-lg hover:bg-teal-700">標記出貨並通知</button>` : ''}
        <span id="trackingMsg" class="text-xs text-slate-500 self-center"></span>`;

      document.getElementById('detailBody').innerHTML = `
        <div class="grid sm:grid-cols-4 gap-4 mb-5">
          <div><p class="text-xs text-slate-500">狀態</p><p class="mt-1"><span class="text-xs px-2 py-0.5 rounded ${s.cls}">${s.zh}</span></p></div>
          <div><p class="text-xs text-slate-500">付款</p><p class="mt-1 font-semibold">${PAY[o.paymentMethod] ?? o.paymentMethod}</p></div>
          <div><p class="text-xs text-slate-500">建立</p><p class="mt-1">${new Date(o.createdAt).toLocaleString('zh-TW')}</p></div>
          <div><p class="text-xs text-slate-500">電子發票</p><p class="mt-1 font-mono">${o.invoiceNumber ?? '尚未開立'}</p></div>
        </div>

        <div class="grid sm:grid-cols-2 gap-5 mb-5">
          <div class="bg-slate-50 rounded-xl p-4">
            <p class="text-xs text-slate-500 mb-1 font-semibold">會員</p>
            <p class="font-semibold">${o.user?.clinicName ?? o.user?.name ?? '—'}</p>
            <p class="text-xs text-slate-600">${o.user?.email ?? ''}</p>
            <p class="text-xs text-slate-600">${o.user?.phone ?? ''}</p>
            ${o.user?.taxId ? `<p class="text-xs text-slate-600">統編 ${o.user.taxId}</p>` : ''}
          </div>
          <div class="bg-slate-50 rounded-xl p-4">
            <p class="text-xs text-slate-500 mb-1 font-semibold">配送</p>
            <p class="font-semibold">${o.recipientName} · ${o.recipientPhone}</p>
            <p class="text-xs text-slate-600">${o.shippingAddress}</p>
            ${o.trackingNumber ? `<p class="text-xs text-teal-700 mt-1">物流追蹤號：${o.trackingNumber}</p>` : ''}
          </div>
        </div>

        <div class="bg-amber-50 border border-amber-200 rounded-xl p-4 mb-5">
          <div class="flex items-center justify-between mb-2">
            <p class="text-xs font-bold text-amber-800">📝 內部備註 <span class="font-normal text-amber-700">(僅員工可見)</span></p>
            ${o.staffNotesUpdatedAt ? `<p class="text-[11px] text-amber-700">最後更新：${new Date(o.staffNotesUpdatedAt).toLocaleString('zh-TW')}</p>` : ''}
          </div>
          <textarea id="notesText" rows="3" placeholder="例：VIP 客戶，請優先出貨 / 已電話確認規格 / 等待收款憑證…"
                    class="w-full px-3 py-2 border border-amber-200 rounded-lg text-sm bg-white">${escapeAttr(o.staffNotes ?? '')}</textarea>
          <div class="flex justify-end mt-2">
            <button onclick="saveNotes('${o.id}')" class="text-xs bg-amber-600 text-white font-semibold px-3 py-1.5 rounded hover:bg-amber-700">儲存備註</button>
            <span id="notesMsg" class="text-xs text-amber-700 self-center ml-2"></span>
          </div>
        </div>

        <p class="text-xs text-slate-500 mb-2 font-semibold">商品明細</p>
        <div class="border border-slate-200 rounded-xl overflow-hidden mb-5">
          <table class="w-full text-sm">
            <thead class="bg-slate-50 text-xs text-slate-500">
              <tr><th class="px-3 py-2 text-left">SKU</th><th class="px-3 py-2 text-left">品名</th><th class="px-3 py-2 text-right">數量</th><th class="px-3 py-2 text-right">單價</th><th class="px-3 py-2 text-right">小計</th></tr>
            </thead>
            <tbody>
              ${o.items.map(i => `
                <tr class="border-t border-slate-100">
                  <td class="px-3 py-2 font-mono text-xs">${i.sku}</td>
                  <td class="px-3 py-2">${i.nameZh}${i.variantName ? ` <span class="text-xs text-slate-500">(${i.variantName})</span>` : ''}</td>
                  <td class="px-3 py-2 text-right">${i.quantity}</td>
                  <td class="px-3 py-2 text-right">NT$ ${i.unitPrice.toLocaleString()}</td>
                  <td class="px-3 py-2 text-right">NT$ ${i.lineTotal.toLocaleString()}</td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>

        <div class="space-y-1 text-sm max-w-xs ml-auto">
          <div class="flex justify-between"><span class="text-slate-500">小計</span><span>NT$ ${o.subtotal.toLocaleString()}</span></div>
          ${o.voucherDiscount ? `<div class="flex justify-between text-emerald-700"><span>優惠折抵 ${o.voucherCode ? '('+o.voucherCode+')' : ''}</span><span>- NT$ ${o.voucherDiscount.toLocaleString()}</span></div>` : ''}
          <div class="flex justify-between"><span class="text-slate-500">運費</span><span>${o.shippingFee === 0 ? '免運' : 'NT$ ' + o.shippingFee.toLocaleString()}</span></div>
          <div class="flex justify-between text-lg font-black text-teal-700 pt-2 border-t border-slate-200"><span>總計</span><span>NT$ ${o.total.toLocaleString()}</span></div>
        </div>`;

      document.getElementById('detail').classList.remove('hidden');
    };

    window.closeDetail = () => document.getElementById('detail').classList.add('hidden');

    function escapeAttr(s) { return String(s ?? '').replace(/[<>&"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }

    window.saveNotes = async (id) => {
      const staffNotes = document.getElementById('notesText').value;
      const msg = document.getElementById('notesMsg');
      msg.textContent = '儲存中…';
      const r = await fetch('/api/orders/' + id + '/notes', {
        method: 'PATCH', headers: { 'Content-Type':'application/json' },
        body: JSON.stringify({ staffNotes }),
      });
      msg.textContent = r.ok ? '✓ 已儲存' : '✗ 儲存失敗';
      setTimeout(() => { msg.textContent = ''; }, 1500);
    };

    window.saveTracking = async (id) => {
      const trackingNumber = document.getElementById('shipTracking').value.trim();
      const msg = document.getElementById('trackingMsg');
      msg.textContent = '儲存中…';
      const r = await fetch('/api/admin/orders/' + id + '/tracking', {
        method:'PATCH', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ trackingNumber }),
      });
      msg.textContent = r.ok ? '✓ 已儲存' : '✗ 儲存失敗';
      setTimeout(() => { msg.textContent = ''; }, 1800);
      if (r.ok) {
        // Refresh the row data in the table without closing the modal
        const fresh = await fetch('/api/orders/' + id).then(r=>r.json()).catch(()=>null);
        if (fresh?.order) {
          const idx = ORDERS.findIndex(o => o.id === id);
          if (idx >= 0) ORDERS[idx] = fresh.order;
          render();
        }
      }
    };

    window.ship = async (id) => {
      const trackingNumber = document.getElementById('shipTracking').value.trim();
      if (!trackingNumber) return alert('請先輸入並儲存物流單號');
      const r = await fetch('/api/admin/orders/' + id + '/ship', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ trackingNumber }),
      });
      if (!r.ok) return alert('失敗');
      closeDetail(); load();
    };

    document.getElementById('q').addEventListener('input', render);
    document.getElementById('status').addEventListener('change', load);
    load();
  </script>
</body>
</html>
